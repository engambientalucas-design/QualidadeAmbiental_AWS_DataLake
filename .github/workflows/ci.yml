name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Validate versioned baseline
        env:
          PYTHONPATH: src
        run: >-
          python -m qa_datalake validate
          data/sample/dados_conformidade_v2_1_0.csv
          --baseline
